# ChromiumOS family derivatives
# Detected via distroId from /etc/os-release or /etc/lsb-release.
#
# All entries here map to familyId: 'chromiumos' in distro.ts.
# Detection order in distro.ts:
#   1. Primary switch on distroId (handles the most common names directly)
#   2. This file (handles less common derivatives and future forks)
#
# Board name alignment:
#   Entries below must match the BOARD values written to
#   /etc/chromiumos-stage3-board by chromiumos-stage3/build.sh, which are
#   sourced from the BOARD= line in each boards/*.conf file.
---
# Upstream / reference builds
- ChromiumOS
- Chromiumos
- ChromeOS
- Chromeos

# openFyde / FydeOS family
- FydeOS
- Fydeos
- openFyde
- Openfyde

# Thorium (compiler-optimized Chromium fork)
- ThoriumOS
- Thoriumos

# WayneOS
- WayneOS
- Wayneos

# Brunch (ChromiumOS on generic x86 hardware)
- Brunch

# ChromiumOS stage3 build environments (from chromiumos-stage3/)
# These run inside Incus containers and identify as ChromiumOS family.
# The variant string matches what detectVariant() returns when
# /etc/os-release contains 'stage3'.
- ChromiumOS-stage3
- Chromiumos-stage3

# openFyde hardware board BOARD values (written to /etc/chromiumos-stage3-board
# by build.sh; also set as CHROMEOS_RELEASE_BOARD in /etc/lsb-release on
# running openFyde systems).
# Source of truth: chromiumos-stage3/boards/*.conf BOARD= lines.
- reven                   # amd64 generic (boards/reven.conf)
- arm64-generic           # arm64 generic (boards/arm64-generic.conf)
- rpi4-openfyde           # Raspberry Pi 4B/400 (boards/rpi4.conf)
- rpi5-openfyde           # Raspberry Pi 5 (boards/rpi5.conf)
- rock5b-openfyde         # ROCK 5B, RK3588S (boards/rk3588.conf)
- rockpi4b-openfyde       # Rock Pi 4B, RK3399 (boards/rk3399.conf)
- orangepi5-openfyde      # Orange Pi 5/5B/5 Plus, RK3588S (boards/orangepi5.conf)
# Additional openFyde boards not yet in chromiumos-stage3/boards/ but present
# on running openFyde systems:
- rock4cp-openfyde
- firefly-rk3588spc-openfyde
- firefly-itx3588j-openfyde
